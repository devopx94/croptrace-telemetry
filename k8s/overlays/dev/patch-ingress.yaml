apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: croptrace-api
spec:
  rules:
    - host: croptrace-dev.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: croptrace-api-dev
                port:
                  number: 80
