apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: croptrace-api-secret
spec:
  refreshInterval: 15m
  data:
    - secretKey: DB_USER
      remoteRef:
        key: croptrace/prod/api
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: croptrace/prod/api
        property: DB_PASSWORD
    - secretKey: MONOLITH_API_KEY
      remoteRef:
        key: croptrace/prod/api
        property: MONOLITH_API_KEY
