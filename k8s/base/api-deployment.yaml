apiVersion: apps/v1
kind: Deployment
metadata:
  name: croptrace-api
  labels:
    app: croptrace-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: croptrace-api
  template:
    metadata:
      labels:
        app: croptrace-api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: croptrace-api
          image: docker.io/YOUR_DOCKERHUB_USERNAME/croptrace-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: croptrace-api-config
            - secretRef:
                name: croptrace-api-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
